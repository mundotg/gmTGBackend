services:
  app:
    build: .
    container_name: minha-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env # 👈 importante
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
