version: "3.9"

services:
  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456

  redis:
    image: redis:7-alpine
    container_name: redis_server
    command: >
      redis-server
      --appendonly yes
      --requirepass 123456
    ports:
      - "6379:6379"
