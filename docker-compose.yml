version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minha-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app
      - /app/node_modules # evita sobrescrever deps (caso uses Node misturado)

    env_file:
      - .env

    environment:
      - PYTHONPATH=/app

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app

    # melhora compatibilidade de hot reload no Windows
    tty: true
    stdin_open: true
